yaml
name: Test CI/CD

# Когда запускать проверки
on:
  push:
    branches: [ main ]      # При пуше в main
  pull_request:
    branches: [ main ]      # При создании PR в main

# Что делать
jobs:
  test:
    runs-on: ubuntu-latest   # Виртуальная машина
    
    steps:
      # 1. Скачать код
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Установить Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      # 3. Установить зависимости
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 4. Запустить линтер (проверка стиля)
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --show-source --statistics
      
      # 5. Запустить тесты
      - name: Test with pytest
        run: |
          pytest test_app.py -v